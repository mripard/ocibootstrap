[package]
name = "ocibootstrap-tar-split"
version = "0.1.0"
edition = "2021"

[lints]
workspace = true

[features]
default = ["gnu_tar"]
gnu_tar = []
native_tar = ["dep:tar"]

[dependencies]
base64 = { version = "0.22.1", default-features = false }
crc = { version = "3.2.1", default-features = false }
flate2 = { version = "1.0.30", default-features = false, features = [
    "rust_backend",
] }
infer = { version = "0.16.0", default-features = false, features = ["std"] }
log = { version = "0.4.21", default-features = false }
serde = { version = "1.0.203", features = ["derive"] }
serde_json = { version = "1.0.117" }
tar = { version = "0.4.41", optional = true, default-features = false }

[dev-dependencies]
rstest = { version = "0.21.0", default-features = false }
